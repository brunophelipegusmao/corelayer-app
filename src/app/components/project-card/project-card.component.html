<article [class]="cardClasses">
  <div class="pointer-events-none absolute -top-24 -right-16 h-44 w-44 rounded-full bg-primary/20 blur-3xl transition-opacity duration-400 group-hover:opacity-100"></div>

  <div class="relative z-10">
    <div class="mb-5 overflow-hidden rounded-xl border border-white/10">
      @if (image) {
        <img
          [src]="image"
          [alt]="title"
          class="h-52 w-full object-cover transition-transform duration-500 group-hover:scale-[1.03]"
        />
      } @else if (placeholderImage) {
        <img
          [src]="placeholderImage"
          [alt]="placeholder || title"
          class="h-52 w-full object-cover transition-transform duration-500 group-hover:scale-[1.03]"
        />
      } @else {
        <div class="from-primary/20 to-primary/5 flex h-52 items-center justify-center bg-gradient-to-br px-6">
          <span class="text-primary text-center text-lg font-semibold">
            {{ placeholder || title }}
          </span>
        </div>
      }
    </div>

    <h3 class="mb-2 text-xl leading-snug font-semibold">{{ title }}</h3>
    <p class="text-card-foreground/80 mb-5 text-sm leading-relaxed">{{ description }}</p>

    <div class="mb-6 flex flex-wrap gap-2">
      @for (tech of technologies; track tech) {
        <span class="tech-chip text-xs">{{ tech }}</span>
      }
    </div>

    <div class="flex flex-wrap gap-3">
      @if (href) {
        <a
          [href]="href"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-2 rounded-lg border border-primary/40 bg-primary/12 px-3 py-2 text-sm font-medium text-primary transition-colors hover:bg-primary/20"
        >
          <lucide-angular [img]="iconExternal" class="h-4 w-4" />
          Ver projeto
        </a>
      }

      @if (githubUrl) {
        <a
          [href]="githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-2 rounded-lg border border-white/20 bg-white/5 px-3 py-2 text-sm font-medium transition-colors hover:bg-white/10"
        >
          <lucide-angular [img]="iconGithub" class="h-4 w-4" />
          Repositório
        </a>
      }
    </div>
  </div>
</article>
