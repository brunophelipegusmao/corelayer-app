<header class="sticky top-0 z-50 border-b border-white/10 bg-background/80 backdrop-blur-xl">
  <div class="mx-auto flex h-20 w-full max-w-6xl items-center justify-between px-4">
    <a routerLink="/" class="group flex items-center gap-3">
      <div class="relative flex h-11 w-11 items-center justify-center overflow-hidden rounded-xl border border-primary/30 bg-primary/10">
        <div class="absolute inset-0 bg-gradient-to-br from-primary/35 via-transparent to-transparent"></div>
        <div class="relative space-y-1">
          <span class="block h-[3px] w-6 rounded-full bg-primary"></span>
          <span class="block h-[3px] w-5 rounded-full bg-primary/80"></span>
          <span class="block h-[3px] w-4 rounded-full bg-primary/60"></span>
        </div>
      </div>

      <div>
        <p class="text-sm leading-tight font-semibold tracking-[0.24em] text-primary uppercase">
          Corelayer
        </p>
        <p class="text-foreground/65 group-hover:text-foreground/90 text-xs transition-colors">
          Transformando a necessidade em solução.
        </p>
      </div>
    </a>

    <div class="hidden items-center gap-3 lg:flex">
      <nav>
        <ul class="flex items-center gap-1 rounded-full border border-white/10 bg-card/55 p-1">
          @for (item of navItems; track item.href) {
            <li>
              <a
                [routerLink]="item.href"
                class="rounded-full px-4 py-2 text-sm font-medium transition-all"
                [class.bg-primary]="isActive(item.href)"
                [class.text-primary-foreground]="isActive(item.href)"
                [class.shadow-[0_0_24px_rgba(27,106,255,0.45)]]="isActive(item.href)"
                [class.text-foreground/80]="!isActive(item.href)"
                [class.hover:bg-white/10]="!isActive(item.href)"
                [class.hover:text-foreground]="!isActive(item.href)"
              >
                {{ item.label }}
              </a>
            </li>
          }
        </ul>
      </nav>
      <app-theme-toggle />
    </div>

    <div class="flex items-center gap-2 lg:hidden">
      <app-theme-toggle />
      <button
        (click)="toggleMenu()"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/10 bg-card/60 transition-colors hover:bg-card"
        aria-label="Abrir menu"
      >
        <lucide-angular
          [img]="isMenuOpen ? iconClose : iconMenu"
          class="h-5 w-5"
        />
      </button>
    </div>
  </div>

  @if (isMenuOpen) {
    <ng-container>
      <nav class="relative z-50 border-t border-white/10 bg-background/95 lg:hidden">
        <ul class="mx-auto max-w-6xl space-y-1 px-4 py-3">
          @for (item of navItems; track item.href) {
            <li>
              <a
                [routerLink]="item.href"
                (click)="closeMenu()"
                class="block rounded-xl px-4 py-3 text-sm font-medium transition-all"
                [class.bg-primary]="isActive(item.href)"
                [class.text-primary-foreground]="isActive(item.href)"
                [class.bg-card/30]="!isActive(item.href)"
                [class.text-foreground/85]="!isActive(item.href)"
                [class.hover:bg-card/60]="!isActive(item.href)"
              >
                {{ item.label }}
              </a>
            </li>
          }
        </ul>
      </nav>
      <button
        aria-label="Fechar menu"
        class="fixed inset-0 z-40 bg-black/20 lg:hidden"
        (click)="closeMenu()"
      ></button>
    </ng-container>
  }
</header>
