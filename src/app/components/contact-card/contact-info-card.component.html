<app-card [animation]="animation">
  <app-card-header>
    <app-card-title>Informações de Contato</app-card-title>
  </app-card-header>

  <app-card-content>
    <div class="space-y-3">
      @for (contact of contacts; track contact.label) {
        @if (contact.href) {
          <a
            [href]="contact.href"
            [target]="contact.target || '_blank'"
            rel="noopener noreferrer"
            class="hover:text-primary flex items-center transition-colors duration-300"
          >
            @if (contact.isWhatsapp) {
              <svg
                viewBox="0 0 24 24"
                aria-hidden="true"
                class="mr-3 h-5 w-5 text-green-500"
                fill="currentColor"
              >
                <path d="M12 2a10 10 0 0 0-8.58 15.13L2 22l4.98-1.31A10 10 0 1 0 12 2m0 18.18c-1.6 0-3.15-.43-4.5-1.24l-.32-.19-2.95.78.79-2.88-.2-.34A8.18 8.18 0 1 1 12 20.18m4.49-6.14c-.25-.13-1.48-.73-1.71-.81-.23-.08-.39-.13-.55.12-.16.25-.64.81-.78.97-.14.16-.29.18-.54.06-.25-.13-1.05-.39-2-1.24-.74-.66-1.24-1.47-1.39-1.72-.14-.25-.02-.39.11-.52.12-.12.25-.29.37-.43.12-.15.16-.25.25-.41.08-.16.04-.31-.02-.44-.06-.13-.55-1.33-.76-1.82-.2-.48-.41-.41-.55-.41h-.47c-.16 0-.41.06-.63.31s-.82.8-.82 1.95.84 2.26.96 2.42c.12.16 1.65 2.52 4 3.53.56.24 1 .38 1.34.49.56.18 1.07.16 1.48.1.45-.07 1.39-.57 1.58-1.13.2-.56.2-1.04.14-1.13-.06-.1-.22-.16-.47-.29" />
              </svg>
            } @else {
              <span class="text-primary mr-3">{{ contact.icon }}</span>
            }
            <span>{{ contact.label }}</span>
          </a>
        } @else {
          <div class="hover:text-primary flex items-center transition-colors duration-300">
            <span class="text-primary mr-3">{{ contact.icon }}</span>
            <span>{{ contact.label }}</span>
          </div>
        }
      }
    </div>
  </app-card-content>
</app-card>
