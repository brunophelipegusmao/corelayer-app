<button
  (click)="toggleTheme()"
  class="relative flex h-10 w-10 items-center justify-center rounded-lg transition-colors duration-200 hover:bg-primary/10 focus:ring-2 focus:ring-primary/50 focus:outline-none"
  [attr.aria-label]="'Alternar para modo ' + (theme() === 'dark' ? 'claro' : 'escuro')"
>
  <svg
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    [attr.stroke-width]="2"
    class="absolute h-5 w-5 transition-all duration-300"
    [class.rotate-0]="theme() === 'dark'"
    [class.scale-100]="theme() === 'dark'"
    [class.opacity-100]="theme() === 'dark'"
    [class.rotate-90]="theme() !== 'dark'"
    [class.scale-0]="theme() !== 'dark'"
    [class.opacity-0]="theme() !== 'dark'"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
    />
  </svg>

  <svg
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    [attr.stroke-width]="2"
    class="absolute h-5 w-5 transition-all duration-300"
    [class.rotate-0]="theme() === 'light'"
    [class.scale-100]="theme() === 'light'"
    [class.opacity-100]="theme() === 'light'"
    [class.-rotate-90]="theme() !== 'light'"
    [class.scale-0]="theme() !== 'light'"
    [class.opacity-0]="theme() !== 'light'"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
    />
  </svg>
</button>
