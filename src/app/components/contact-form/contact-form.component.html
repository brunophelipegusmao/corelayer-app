<app-card [animation]="animation">
  <app-card-header>
    <app-card-title>Envie uma Mensagem</app-card-title>
  </app-card-header>

  <app-card-content>
    <form #contactFormRef (submit)="onSubmit($event)" class="space-y-6">
      <div class="fade-in-up animate-delay-300">
        <label for="user_name" class="mb-2 block text-sm font-medium text-gray-300">
          Nome *
        </label>
        <input
          id="user_name"
          name="user_name"
          type="text"
          required
          [disabled]="isSubmitting"
          class="border-border bg-input text-foreground focus:ring-primary hover:border-primary/50 w-full rounded-lg border p-3 transition-all duration-300 focus:border-transparent focus:ring-2 disabled:cursor-not-allowed disabled:opacity-50 bg-dark-secondary border-primary focus:border-accent"
        />
      </div>

      <div class="fade-in-up animate-delay-400">
        <label for="user_email" class="mb-2 block text-sm font-medium text-gray-300">
          Email *
        </label>
        <input
          id="user_email"
          name="user_email"
          type="email"
          required
          [disabled]="isSubmitting"
          class="border-border bg-input text-foreground focus:ring-primary hover:border-primary/50 w-full rounded-lg border p-3 transition-all duration-300 focus:border-transparent focus:ring-2 disabled:cursor-not-allowed disabled:opacity-50 bg-dark-secondary border-primary focus:border-accent"
        />
      </div>

      <div class="fade-in-up animate-delay-500">
        <label for="subject" class="mb-2 block text-sm font-medium text-gray-300">
          Assunto *
        </label>
        <input
          id="subject"
          name="subject"
          type="text"
          required
          [disabled]="isSubmitting"
          class="border-border bg-input text-foreground focus:ring-primary hover:border-primary/50 w-full rounded-lg border p-3 transition-all duration-300 focus:border-transparent focus:ring-2 disabled:cursor-not-allowed disabled:opacity-50 bg-dark-secondary border-primary focus:border-accent"
        />
      </div>

      <div class="fade-in-up animate-delay-600">
        <label for="message" class="mb-2 block text-sm font-medium text-gray-300">
          Mensagem *
        </label>
        <textarea
          id="message"
          name="message"
          required
          rows="4"
          [disabled]="isSubmitting"
          class="border-border bg-input text-foreground focus:ring-primary hover:border-primary/50 w-full resize-none rounded-lg border p-3 transition-all duration-300 focus:border-transparent focus:ring-2 disabled:cursor-not-allowed disabled:opacity-50 bg-dark-secondary border-primary focus:border-accent"
        ></textarea>
      </div>

      @if (message) {
        <div class="fade-in-up">
          <div
            class="rounded-lg p-3 text-sm"
            [class.border-green-200]="messageType === 'success'"
            [class.bg-green-100]="messageType === 'success'"
            [class.text-green-800]="messageType === 'success'"
            [class.border-red-200]="messageType === 'error'"
            [class.bg-red-100]="messageType === 'error'"
            [class.text-red-800]="messageType === 'error'"
          >
            {{ message }}
          </div>
        </div>
      }

      <div class="fade-in-up animate-delay-700">
        <app-button
          type="submit"
          variant="primary"
          size="lg"
          className="hover:shadow-primary/30 w-full"
          [disabled]="isSubmitting"
        >
          {{ isSubmitting ? 'Enviando...' : 'Enviar Mensagem' }}
        </app-button>
      </div>
    </form>
  </app-card-content>
</app-card>
